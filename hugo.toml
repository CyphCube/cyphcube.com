baseURL = "https://cyphcube.com/"
languageCode = "en-us"
title = "CyphCube"

[params]
  tagline = "Building the Ethwei ecosystem."
  description = "CyphCube builds Ethwei, a Proof-of-Stake blockchain on Cosmos SDK, and the products around it."
  github = "https://github.com/CyphCube"
  email = "info@cyphcube.com"

  [[params.projects]]
    name = "Ethwei"
    logo = "/images/projects/ethwei.png"
    description = "A Proof-of-Stake blockchain built on Cosmos SDK. \"A boring and simple blockchain is a good blockchain\" — like Bitcoin, but stakeable."

    [[params.projects.links]]
      label = "Website"
      icon = "globe"
      url = "https://ethwei.com"

    [[params.projects.links]]
      label = "Docs"
      icon = "docs"
      url = "https://docs.ethwei.com"

    [[params.projects.links]]
      label = "Explorer"
      icon = "explorer"
      url = "https://explorer.ethwei.com/testnet"

  [[params.projects]]
    name = "Coinbroo"
    logo = "/images/projects/coinbroo.png"
    description = "The native DEX of the Ethwei ecosystem. Built on Hyperliquid with deep liquidity and security — trade on Coinbroo to earn ETE rewards."

    [[params.projects.links]]
      label = "Website"
      icon = "globe"
      url = "https://coinbroo.com"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
